<!DOCTYPE html>
<html>
<head>
<title>Progress Update</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<h1 class="text-3xl font-bold text-blue-700 mb-6">
Project Progress Updates
</h1>

<div class="bg-white p-6 rounded-xl shadow mb-8">

<form method="POST">

<div class="grid grid-cols-2 gap-4">

<select name="project_id" class="border p-3 rounded" required>

<option value="">Select Project</option>

{% for project in projects %}
<option value="{{ project.id }}">
{{ project.name }}
</option>
{% endfor %}

</select>

<input
type="number"
name="progress"
placeholder="Progress %"
class="border p-3 rounded"
required>

</div>

<textarea
name="completed_tasks"
placeholder="Completed Tasks"
class="border p-3 rounded w-full mt-4"
required></textarea>

<textarea
name="remaining_work"
placeholder="Remaining Work"
class="border p-3 rounded w-full mt-4"
required></textarea>

<textarea
name="remarks"
placeholder="Remarks"
class="border p-3 rounded w-full mt-4"></textarea>

<button class="bg-blue-600 text-white px-6 py-3 rounded-lg mt-4">
Submit Progress
</button>

</form>

</div>

<div class="bg-white rounded-xl shadow overflow-hidden">

<table class="w-full">

<tr class="bg-blue-600 text-white">

<th class="p-4">Project</th>
<th class="p-4">Progress</th>
<th class="p-4">Completed</th>
<th class="p-4">Remaining</th>
<th class="p-4">Remarks</th>

</tr>

{% for update in updates %}

<tr class="border-b">

<td class="p-4">{{ update.project_name }}</td>
<td class="p-4">{{ update.progress }}%</td>
<td class="p-4">{{ update.completed_tasks }}</td>
<td class="p-4">{{ update.remaining_work }}</td>
<td class="p-4">{{ update.remarks }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
