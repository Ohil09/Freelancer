<!DOCTYPE html>
<html>
<head>
<title>Time Tracking</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="p-8">

<h1 class="text-2xl font-bold mb-6">
Track Time for {{project.name}}
</h1>

<h2 id="timer" class="text-xl font-bold mb-4">0h 0m 0s</h2>

<button onclick="startTimer()" class="bg-green-500 text-white px-4 py-2 rounded mr-2">
Start Timer
</button>

<button onclick="stopTimer()" class="bg-red-500 text-white px-4 py-2 rounded">
Stop Timer
</button>

<br><br>

<form method="POST">

<input id="hoursInput" type="number" step="0.01" name="hours"
placeholder="Hours will appear automatically"
class="border p-2 w-full mb-3">

<button class="bg-blue-500 text-white px-4 py-2 rounded">
Save Time
</button>

</form>

<br>

<a href="/projects" class="bg-gray-500 text-white px-4 py-2 rounded">
Back to Projects
</a>

</div>

<!-- JS file should be loaded at the bottom -->
<script src="{{ url_for('static', filename='js/timer.js') }}"></script>

</body>
</html>
