<!DOCTYPE html>
<html>
<head>
    <title>Add User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-20 bg-white p-10 rounded-2xl shadow">

    <h1 class="text-4xl font-bold mb-8">
        Add New User
    </h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               class="border w-full p-3 rounded mb-5"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               class="border w-full p-3 rounded mb-5"
               required>

        <select name="role"
                class="border w-full p-3 rounded mb-5">

            <option value="user">User</option>
            <option value="admin">Admin</option>

        </select>

        <button class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg">
            Add User
        </button>

        <a href="/admin/users"
           class="bg-gray-500 text-white px-6 py-3 rounded-lg ml-3">
            Back
        </a>

    </form>

</div>

</body>
</html>
