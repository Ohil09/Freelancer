<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-50 via-white to-purple-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md px-6">

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Top Banner -->
        <div class="bg-gradient-to-r from-purple-600 to-purple-800 px-10 py-10 text-center">
            <div class="w-16 h-16 bg-white bg-opacity-20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
            <p class="text-purple-200 text-sm mt-1">Sign in to your account</p>
        </div>

        <!-- Form -->
        <form method="POST" class="px-10 py-8">

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-5 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <!-- Username -->
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-purple-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </span>
                    <input type="text" name="username"
                        placeholder="Enter your username"
                        class="border border-slate-200 pl-10 pr-4 py-3 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent bg-slate-50 text-slate-700 placeholder-slate-400 transition"
                        required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-7">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-purple-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </span>
                    <input type="password" name="password"
                        placeholder="Enter your password"
                        class="border border-slate-200 pl-10 pr-4 py-3 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent bg-slate-50 text-slate-700 placeholder-slate-400 transition"
                        required>
                </div>
            </div>

            <!-- Button -->
            <button type="submit"
                class="bg-gradient-to-r from-purple-600 to-purple-700 text-white w-full py-3 rounded-xl hover:from-purple-700 hover:to-purple-800 font-semibold transition duration-200 shadow-lg hover:shadow-purple-200 hover:shadow-xl">
                Sign In
            </button>

            <p class="text-center text-slate-400 text-xs mt-6 flex items-center justify-center gap-1">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                </svg>
                Secure login • Freelancer Management System
            </p>

        </form>

    </div>

</div>

</body>
</html>
