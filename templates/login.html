<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<form method="POST" class="bg-white p-8 rounded shadow w-80">

<h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

<!-- Username -->
<input type="text" name="username"
placeholder="Enter Username"
class="border p-2 w-full mb-4 rounded" required>

<!-- Password ✅ ADDED -->
<input type="password" name="password"
placeholder="Enter Password"
class="border p-2 w-full mb-6 rounded" required>

<!-- Button -->
<button type="submit"
class="bg-blue-500 text-white w-full py-2 rounded hover:bg-blue-600">
Login
</button>

</form>

</body>
</html>
