<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center h-screen">

<form method="POST" class="bg-white p-10 rounded-2xl shadow-xl w-96">

<div class="mb-8">
<h2 class="text-3xl font-bold text-center text-slate-800">Welcome Back</h2>
<p class="text-center text-slate-500 text-sm mt-2">Sign in to your account</p>
</div>

<!-- Username -->
<div class="mb-5">
<label class="block text-sm font-medium text-slate-700 mb-2">Username</label>
<input type="text" name="username"
placeholder="Enter your username"
class="border border-slate-300 p-3 w-full mb-0 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
</div>

<!-- Password -->
<div class="mb-6">
<label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
<input type="password" name="password"
placeholder="Enter your password"
class="border border-slate-300 p-3 w-full mb-0 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
</div>

<!-- Button -->
<button type="submit"
class="bg-blue-600 text-white w-full py-3 rounded-lg hover:bg-blue-700 font-semibold transition duration-200 shadow-md hover:shadow-lg">
Sign In
</button>

<p class="text-center text-slate-500 text-xs mt-6">
Secure login • All data encrypted
</p>

</form>

</body>
</html>
