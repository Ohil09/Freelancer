{% extends "base.html" %}

{% block title %}Edit Project - Freelancer Pro{% endblock %}

{% block content %}
<div>
    <!-- PAGE HEADER -->
    <div style="margin-bottom: 30px;">
        <h1 style="margin-bottom: 8px;">✎ Edit Project</h1>
        <p style="color: #64748b; font-size: 15px;">Update project details and settings.</p>
    </div>

    <!-- EDIT PROJECT FORM -->
    <div class="card" style="max-width: 600px;">
        {% if error %}
            <div class="alert alert-danger">
                <strong>⚠️ Error:</strong> {{ error }}
            </div>
        {% endif %}
        
        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">
                    Project Name <span style="color: #f43f5e;">*</span>
                </label>
                <input
                    type="text"
                    name="name"
                    value="{{ project.name }}"
                    required
                    style="width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px;"
                >
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">
                    Project Type <span style="color: #f43f5e;">*</span>
                </label>
                <input
                    type="text"
                    name="type"
                    value="{{ project.type }}"
                    required
                    style="width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px;"
                >
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">
                    Hourly Rate (₹) <span style="color: #f43f5e;">*</span>
                </label>
                <input
                    type="number"
                    step="0.01"
                    min="0"
                    name="rate"
                    value="{{ project.rate }}"
                    required
                    style="width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px;"
                >
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">
                    Status <span style="color: #f43f5e;">*</span>
                </label>
                <select
                    name="status"
                    required
                    style="width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px;"
                >
                    <option value="Active" {% if project.status == "Active" %}selected{% endif %}>
                        Active
                    </option>
                    <option value="Inactive" {% if project.status == "Inactive" %}selected{% endif %}>
                        Inactive
                    </option>
                    <option value="Completed" {% if project.status == "Completed" %}selected{% endif %}>
                        Completed
                    </option>
                </select>
            </div>
            
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button type="submit" class="btn btn-primary" style="padding: 12px 30px;">
                    ✓ Update Project
                </button>
                
                <a href="/projects" class="btn btn-secondary" style="padding: 12px 30px; text-decoration: none;">
                    📋 Back to Projects
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    @media (max-width: 768px) {
        .card {
            padding: 20px !important;
        }
    }
</style>
{% endblock %}
