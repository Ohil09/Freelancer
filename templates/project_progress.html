<!DOCTYPE html>
<html>
<head>
    <title>Project Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-8">

    <h1 class="text-4xl font-bold text-blue-700 mb-8">
        Project Progress Updates
    </h1>

    <!-- FORM -->
    <div class="bg-white p-8 rounded-xl shadow mb-10">

        <form method="POST">

            <div class="grid grid-cols-2 gap-4 mb-4">

                <!-- PROJECT -->
                <select name="project_id"
                    class="border p-3 rounded w-full"
                    required>

                    <option value="">Select Project</option>

                    {% for project in projects %}
                    <option value="{{ project.id }}">
                        {{ project.name }}
                    </option>
                    {% endfor %}

                </select>

                <!-- PROGRESS -->
                <input
                    type="number"
                    name="progress"
                    placeholder="Progress %"
                    class="border p-3 rounded w-full"
                    required>

            </div>

            <!-- COMPLETED TASKS -->
            <textarea
                name="completed_tasks"
                placeholder="Completed Tasks"
                class="border p-3 rounded w-full mb-4 h-24"
                required></textarea>

            <!-- REMAINING WORK -->
            <textarea
                name="remaining_work"
                placeholder="Remaining Work"
                class="border p-3 rounded w-full mb-4 h-24"
                required></textarea>

            <!-- REMARKS -->
            <textarea
                name="remarks"
                placeholder="Remarks"
                class="border p-3 rounded w-full mb-6 h-24"></textarea>

            <button
                class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">

                Submit Progress

            </button>

        </form>

    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow overflow-hidden">

        <table class="w-full">

            <tr class="bg-blue-600 text-white">

                <th class="p-4 text-left">Project</th>
                <th class="p-4 text-left">Progress</th>
                <th class="p-4 text-left">Completed</th>
                <th class="p-4 text-left">Remaining</th>
                <th class="p-4 text-left">Remarks</th>

            </tr>

            {% for update in updates %}

            <tr class="border-b">

                <td class="p-4">
                    {{ update.name }}
                </td>

                <td class="p-4">
                    {{ update.progress }}%
                </td>

                <td class="p-4">
                    {{ update.completed_tasks }}
                </td>

                <td class="p-4">
                    {{ update.remaining_work }}
                </td>

                <td class="p-4">
                    {{ update.remarks }}
                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
