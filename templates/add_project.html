<!DOCTYPE html>
<html>
<head>
<title>Add Project</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-2xl mx-auto p-8">

<h1 class="text-3xl font-bold mb-6">Add Project</h1>

{% if error %}
<div class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4">
    {{ error }}
</div>
{% endif %}

<form method="POST" class="bg-white p-6 rounded-xl shadow">

<div class="mb-4">
    <label class="block font-semibold mb-2">Project Name *</label>
    <input name="name" placeholder="Enter project name"
    class="border p-3 w-full rounded" required>
</div>

<div class="mb-4">
    <label class="block font-semibold mb-2">Project Type *</label>
    <input name="type" placeholder="E.g., Web Development, Design"
    class="border p-3 w-full rounded" required>
</div>

<div class="mb-4">
    <label class="block font-semibold mb-2">Hourly Rate (₹) *</label>
    <input type="number" step="0.01" name="rate" placeholder="Enter hourly rate"
    class="border p-3 w-full rounded" required>
</div>

<div class="mb-4">
    <label class="block font-semibold mb-2">Status</label>
    <select name="status" class="border p-3 w-full rounded">
    <option value="Active">Active</option>
    <option value="Inactive">Inactive</option>
    <option value="Completed">Completed</option>
    </select>
</div>

<div class="mb-4">
    <label class="block font-semibold mb-2">Deadline</label>
    <input type="date" name="deadline" class="border p-3 w-full rounded">
</div>

<div class="mb-4">
    <label class="block font-semibold mb-2">Description</label>
    <textarea name="description" placeholder="Project description" 
    class="border p-3 w-full rounded h-24"></textarea>
</div>

{% if session["role"] == "admin" %}
<div class="mb-4">
    <label class="block font-semibold mb-2">Assign to Freelancer *</label>
    <select name="user_id" class="border p-3 w-full rounded" required>
    <option value="">-- Select Freelancer --</option>
    {% for user in users %}
    <option value="{{ user.id }}">
        {{ user.username }}
    </option>
    {% endfor %}
    </select>
</div>
{% endif %}

<div class="flex gap-4">
    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded">
    Save Project
    </button>
    
    <a href="/projects" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded">
    Cancel
    </a>
</div>

</form>

</div>

</body>
</html>
